name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Create release archive
        run: |
          plugin_name=$(jq -r '.name' plugin.json)

          mkdir -p "${plugin_name}/dist"
          mkdir -p "${plugin_name}/py_modules"
          mkdir -p "${plugin_name}/bin"
          mkdir -p "${plugin_name}/resources"

          # Frontend bundle
          cp dist/index.js "${plugin_name}/dist/"
          cp dist/index.js.map "${plugin_name}/dist/"

          # Plugin metadata
          cp plugin.json "${plugin_name}/"
          cp package.json "${plugin_name}/"
          cp LICENSE "${plugin_name}/"

          # Backend
          cp main.py "${plugin_name}/"
          cp py_modules/*.py "${plugin_name}/py_modules/"

          # Resources
          cp defaults/resources/* "${plugin_name}/resources/"

          zip -r "${plugin_name}.zip" "${plugin_name}"

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: AudioForge.zip

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.audioforge.jamesdsp.yaml
          bundle: jamesdsp.flatpak
          upload-artifact: false
          cache-key: flatpak-builder-${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: jamesdsp.flatpak

  release:
    needs: [build-plugin, build-flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle

      - name: Verify artifacts
        run: ls -lh jamesdsp.flatpak AudioForge.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AudioForge.zip
            jamesdsp.flatpak
          generate_release_notes: true
