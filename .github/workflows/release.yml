name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate and set version from tag
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          # Must be semver: MAJOR.MINOR.PATCH with optional -prerelease suffix
          if ! echo "$version" | grep -qP '^\d+\.\d+\.\d+(-[a-zA-Z0-9]+[a-zA-Z0-9.]*)?$'; then
            echo "::error::Invalid version '${version}'. Must match MAJOR.MINOR.PATCH (e.g. v1.2.3 or v1.2.3-rc1)"
            exit 1
          fi

          # Each numeric part must be a valid integer (no leading zeros except bare 0)
          IFS='.' read -r major minor patch_full <<< "$version"
          patch="${patch_full%%-*}"
          for part in "$major" "$minor" "$patch"; do
            if echo "$part" | grep -qP '^0\d+'; then
              echo "::error::Version part '${part}' has leading zeros"
              exit 1
            fi
          done

          echo "Setting version to ${version}"
          jq --arg v "$version" '.version = $v' plugin.json > plugin.json.tmp && mv plugin.json.tmp plugin.json
          jq --arg v "$version" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Create release archive
        run: |
          plugin_name=$(jq -r '.name' plugin.json)

          mkdir -p "${plugin_name}/dist"
          mkdir -p "${plugin_name}/py_modules"
          mkdir -p "${plugin_name}/bin"
          mkdir -p "${plugin_name}/resources"

          # Frontend bundle
          cp dist/index.js "${plugin_name}/dist/"
          cp dist/index.js.map "${plugin_name}/dist/"

          # Plugin metadata
          cp plugin.json "${plugin_name}/"
          cp package.json "${plugin_name}/"
          cp LICENSE "${plugin_name}/"

          # Backend
          cp main.py "${plugin_name}/"
          cp py_modules/*.py "${plugin_name}/py_modules/"

          # Resources
          cp defaults/resources/* "${plugin_name}/resources/"

          zip -r "${plugin_name}.zip" "${plugin_name}"

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: AudioForge.zip

  check-flatpak-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      previous_tag: ${{ steps.check.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for flatpak source changes
        id: check
        run: |
          # Find the previous release tag
          current_tag="${GITHUB_REF#refs/tags/}"
          previous_tag=$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1)

          echo "Current tag: ${current_tag}"
          echo "Previous tag: ${previous_tag}"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

          if [ -z "$previous_tag" ]; then
            echo "No previous tag found — flatpak build required"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if flatpak-related paths changed
          changes=$(git diff --name-only "${previous_tag}..${current_tag}" -- \
            org.audioforge.jamesdsp.yaml \
            flatpak-meta/ \
            jdsp/)

          if [ -n "$changes" ]; then
            echo "Flatpak source changed:"
            echo "$changes"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No flatpak source changes — will reuse previous release binary"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-flatpak:
    needs: check-flatpak-changes
    if: needs.check-flatpak-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.audioforge.jamesdsp.yaml
          bundle: jamesdsp.flatpak
          upload-artifact: false
          cache-key: flatpak-builder-${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: jamesdsp.flatpak

  reuse-flatpak:
    needs: check-flatpak-changes
    if: needs.check-flatpak-changes.outputs.changed == 'false'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download flatpak from previous release
        run: |
          previous_tag="${{ needs.check-flatpak-changes.outputs.previous_tag }}"
          echo "Downloading jamesdsp.flatpak from release ${previous_tag}"
          gh release download "${previous_tag}" \
            --repo "${{ github.repository }}" \
            --pattern "jamesdsp.flatpak"

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: jamesdsp.flatpak

  release:
    needs: [build-plugin, build-flatpak, reuse-flatpak]
    if: always() && needs.build-plugin.result == 'success' && (needs.build-flatpak.result == 'success' || needs.reuse-flatpak.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle

      - name: Include flatpak in plugin ZIP
        run: |
          plugin_name="AudioForge"
          # Unzip, add flatpak bundle, re-zip
          unzip -o "${plugin_name}.zip"
          mkdir -p "${plugin_name}/bin"
          cp jamesdsp.flatpak "${plugin_name}/bin/"
          rm "${plugin_name}.zip"
          zip -r "${plugin_name}.zip" "${plugin_name}"

      - name: Verify artifacts
        run: ls -lh jamesdsp.flatpak AudioForge.zip && unzip -l AudioForge.zip | grep flatpak

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AudioForge.zip
            jamesdsp.flatpak
          generate_release_notes: true
